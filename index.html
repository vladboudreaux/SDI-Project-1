<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Battler</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <script src="./scripts/index.js" defer></script>
</head>

<body>
    <div class="pageHeader">
        <h1> Pokemon Battler</h1>
    </div>

    <button id="randomSelect">Randomly Select 2 Pokemon!</button>

    <button id="clearButton" class="clearButton"> Clear Data </button>

    <div class="arena" id="arena">
        <div class="pokemon-card" id="pokemon1"> Select Pokemon to Continue</div>
        <div class="battle-log" id="battle-log">
            <h2> Battle Log </h2>
            <ol id="log-list" reversed></ol>
        </div>
        <div class="pokemon-card" id="pokemon2"> Select Pokemon to Continue</div>
    </div>

    <footer>
        <a href="https://github.com/vladboudreaux/SDI-Project-1" target="_blank"> Github</a>
        <a href="./howToPlay.html" target="_blank"> How to Play</a>
    </footer>

</body>

</html>
